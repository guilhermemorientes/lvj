    :root {
      --primary: #2c3e50;
      --primary-light: #34495e;

      --white: #ffffff;

      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .success-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    .success-popup {
      position: relative;
      z-index: 2;
      background: var(--white);
      padding: 3rem 2.5rem;
      border-radius: 20px;
      box-shadow: var(--shadow-2xl);
      text-align: center;
      max-width: 480px;
      width: 90%;
      animation: popupFadeIn 0.6s ease-out;
    }

    @keyframes popupFadeIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {

        transform: translateY(0) scale(1);
      }
    }

    .success-icon {

      height: 80px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(46, 204, 113, 0.4);
    }

    .success-icon svg {
      width: 40px;
      height: 40px;
      stroke: var(--white);
      stroke-width: 3;
      fill: none;
    }

    .success-popup h1 {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 1rem;
      line-height: 1.3;
    }

      font-size: 1.1rem;
      color: #64748b;

    }

      font-weight: 700;

      text-transform: uppercase;

      border: none;

      background: linear-gradient(135deg, var(--primary), var(--primary-light));

      cursor: pointer;
      transition: var(--transition);
